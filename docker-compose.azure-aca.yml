# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.azure-aca.yml  — "All Docker, Hosted on Azure"
#
# Deploys the FULL STACK as Docker containers on Azure Container Apps.
# No managed Azure database services required — Postgres and Couchbase run
# as containers just like they do locally.
#
# This is the simplest path to Azure: identical to local docker-compose.yml
# but with ACR image references and ACA-specific environment settings.
#
# Deploy with:
#   az containerapp compose create \
#     --environment <aca-env-name> \
#     --resource-group <rg-name> \
#     --compose-file-path docker-compose.azure-aca.yml
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL — identical Docker image, persistent Azure volume ───────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: productcatalog
      POSTGRES_USER: ${POSTGRES_USER:-catalog_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}          # required — set in ACA secrets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catalog_user} -d productcatalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Couchbase Community — identical Docker image ───────────────────────────
  couchbase:
    image: couchbase:community-7.2.0
    volumes:
      - couchbase_data:/opt/couchbase/var
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/pools"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka (KRaft mode — no Zookeeper needed) ───────────────────────────────
  kafka:
    image: bitnami/kafka:3.6
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Application — image from Azure Container Registry ─────────────────────
  product-catalog-service:
    image: ${ACR_LOGIN_SERVER}/product-catalog-service:${IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/productcatalog
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-catalog_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_COUCHBASE_CONNECTION_STRING: couchbase://couchbase
      SPRING_COUCHBASE_USERNAME: ${COUCHBASE_USER:-Administrator}
      SPRING_COUCHBASE_PASSWORD: ${COUCHBASE_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_JWT_SECRET: ${APP_JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  couchbase_data:
