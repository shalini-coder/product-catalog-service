version: "3.9"

services:


  # ── Couchbase (read side) ───────────────────────────────────────────────────
  couchbase:
    image: couchbase:community-7.2.0
    container_name: product-catalog-couchbase
    ports:
      - "8091-8096:8091-8096"
      - "11210:11210"
    volumes:
      - couchbase_data:/opt/couchbase/var
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "Administrator:password", "http://localhost:8091/pools"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.1
    container_name: product-catalog-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.1
    container_name: product-catalog-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Couchbase initializer (runs once, exits) ────────────────────────────────
  couchbase-init:
    image: curlimages/curl:8.5.0
    depends_on:
      couchbase:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Checking Couchbase cluster..."

        # If already initialized (returns 200 with credentials), skip setup
        if curl -sf -u Administrator:password http://couchbase:8091/pools/default > /dev/null 2>&1; then
          echo "Cluster already initialized, skipping setup."
        else
          echo "Initializing Couchbase cluster..."
          curl -sf -X POST http://couchbase:8091/node/controller/rename \
            -d hostname=127.0.0.1
          curl -sf -X POST http://couchbase:8091/node/controller/setupServices \
            -d services=kv,n1ql,index
          curl -sf -X POST http://couchbase:8091/settings/web \
            -d username=Administrator -d password=password -d port=SAME
          curl -sf -X POST http://couchbase:8091/pools/default \
            -u Administrator:password \
            -d memoryQuota=512 -d indexMemoryQuota=256
          echo "Cluster initialized."
        fi

        # Create bucket if it doesn't exist
        if curl -sf -u Administrator:password http://couchbase:8091/pools/default/buckets/product-catalog > /dev/null 2>&1; then
          echo "Bucket 'product-catalog' already exists."
        else
          echo "Creating bucket 'product-catalog'..."
          curl -sf -X POST http://couchbase:8091/pools/default/buckets \
            -u Administrator:password \
            -d name=product-catalog -d bucketType=couchbase \
            -d ramQuotaMB=256 -d replicaNumber=0 -d authType=none
          echo "Bucket created."
        fi

        echo "Couchbase ready."

  # ── Application ─────────────────────────────────────────────────────────────
  product-catalog-service:
    image: product-catalog-service:local
    build: .
    container_name: product-catalog-service
    depends_on:
      kafka:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/productcatalog
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_COUCHBASE_CONNECTION_STRING: couchbase://couchbase
      SPRING_COUCHBASE_USERNAME: Administrator
      SPRING_COUCHBASE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_SECURITY_JWT_SECRET: local-dev-secret-key-minimum-32-chars-long
      APP_SECURITY_JWT_EXPIRATION_MS: 86400000

volumes:
  couchbase_data:
