# ─────────────────────────────────────────────────────────────────────────────
# POC compose file — all Docker images, no managed Azure services needed.
# Identical topology to local dev. Works locally AND on Azure Container Apps.
#
# Usage (local):   docker compose -f docker-compose.poc.yml up --build
# Usage (Azure):   see scripts/deploy-poc.ps1
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. PostgreSQL — write side ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: poc-postgres
    environment:
      POSTGRES_DB: productcatalog
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: poc_pass_123
    ports:
      - "5432:5432"
    volumes:
      - poc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d productcatalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 2. Couchbase — read side ────────────────────────────────────────────────
  couchbase:
    image: couchbase:community-7.2.0
    container_name: poc-couchbase
    ports:
      - "8091:8091"   # Admin UI — visit http://localhost:8091 (admin/poc_pass_123)
      - "11210:11210"
    volumes:
      - poc_couchbase_data:/opt/couchbase/var
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/pools"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── 3. Couchbase bootstrap (runs once, sets up the bucket) ──────────────────
  couchbase-init:
    image: curlimages/curl:8.5.0
    container_name: poc-couchbase-init
    depends_on:
      couchbase:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo ">>> Initialising Couchbase node..."
        curl -sf -X POST http://couchbase:8091/nodes/self/controller/settings \
          -d 'path=/opt/couchbase/var/lib/couchbase/data&index_path=/opt/couchbase/var/lib/couchbase/data'

        curl -sf -X POST http://couchbase:8091/node/controller/rename \
          -d 'hostname=couchbase'

        curl -sf -X POST http://couchbase:8091/node/controller/setupServices \
          -d 'services=kv%2Cn1ql%2Cindex'

        curl -sf -X POST http://couchbase:8091/settings/web \
          -d 'username=Administrator&password=poc_pass_123&port=SAME'

        curl -sf -X POST http://couchbase:8091/pools/default \
          -u Administrator:poc_pass_123 \
          -d 'memoryQuota=512&indexMemoryQuota=256'

        echo ">>> Creating bucket: product-catalog..."
        curl -sf -X POST http://couchbase:8091/pools/default/buckets \
          -u Administrator:poc_pass_123 \
          -d 'name=product-catalog&bucketType=couchbase&ramQuota=256&replicaNumber=0&flushEnabled=1'

        echo ">>> Couchbase ready."

  # ── 4. Kafka (KRaft — no Zookeeper needed) ─────────────────────────────────
  kafka:
    image: bitnami/kafka:3.6
    container_name: poc-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  # ── 5. Application ──────────────────────────────────────────────────────────
  app:
    # For local build:  image: product-catalog-service:latest
    # For Azure (ACR):  set ACR_IMAGE env var before running
    image: ${ACR_IMAGE:-product-catalog-service:latest}
    container_name: poc-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"   # API  — http://localhost:8080/swagger-ui/index.html
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: poc
      # PostgreSQL (write side)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/productcatalog
      SPRING_DATASOURCE_USERNAME: catalog_user
      SPRING_DATASOURCE_PASSWORD: poc_pass_123
      # Couchbase (read side)
      SPRING_COUCHBASE_CONNECTION_STRING: couchbase://couchbase
      SPRING_COUCHBASE_USERNAME: Administrator
      SPRING_COUCHBASE_PASSWORD: poc_pass_123
      SPRING_DATA_COUCHBASE_BUCKET_NAME: product-catalog
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # JWT (POC only — change for real deployments)
      APP_SECURITY_JWT_SECRET: poc-jwt-secret-change-this-for-real-use-must-be-64chars!!
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

volumes:
  poc_postgres_data:
  poc_couchbase_data:
